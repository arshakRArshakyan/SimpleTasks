<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multipe table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <ul class="header-inner">
            <li class="logo">
                <a href="index.html">
                    <div class="header-title">Բազմապատկման աղյուսակ</div>
                </a>
            </li>
            <li class="action">
                <div class="action-buttons">
                    <button>2</button>
                    <button>3</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>
            </li>
        </ul>
    </header>
    <main class="main">
        <div class="main-inner">
            <div class="content-name hidden">Կարող ես ասել</div>
            <div class="multiple-area hidden">
                <div class="panel-left">
                    <div class="asks-list"></div>
                </div>
                <div class="panel-right">
                    <div class="question-list"></div>

                    <div class="image correct hidden">
                        <img src="image/correct.gif" alt="image">
                    </div>
                    <div class="image incorrect hidden">
                        <img src="image/incorrect.gif" alt="image">
                    </div>
                    <div class="answer hidden">
                        <div class="correct-answer">answer</div>
                    </div>
                </div>
            </div>
            <div class="default-container">
                <div class="cover-container">
                    <div class="cover-image"><img src="image/cover.png" alt=""></div>
                    <div class="title">
                        <div class="title-inner">Ողջույն, պատրա՞ստ ես սովորել բազմապատկման աղյուսակը</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
